substitutions:
  name: bb32
  stra2us_client_id: !secret stra2us_client_id
  stra2us_secret_hex: !secret stra2us_secret_hex
  stra2us_host: !secret stra2us_host
  stra2us_port: !secret stra2us_port
  firmware_url: !secret firmware_url
  project_version: !env_var ESPHOME_PROJECT_VERSION 0000.00.00.0000
  # Stra2us application namespace — used to build KV lookup keys:
  #   device-specific : ${stratus_app}/${name}/<var_id>
  #   app-wide default: ${stratus_app}/<var_id>
  stratus_app: coaticlock

esphome:
  name: ${name}
  friendly_name: ${name}
  project:
    name: coaticlock.bb32
    version: "${project_version}"
  includes:
    - coati_engine.h
    - IoTClientIDF.h
    - bb32_idf_includes.h

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf
    version: 5.5.3

# Enable Home Assistant API
api:
  reboot_timeout: 0s   # Default 15min timeout causes rst=SW when no HA client connects
  encryption:
    key: "ZkIcQPXumySkKDYUxq3PFE6oZxuMusI6gNv1VTd/Z98="

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  fast_connect: true
  power_save_mode: NONE
  ap:
    ssid: "Bb32 Fallback Hotspot"
    password: "ByIg5i1tSdFp"

captive_portal:

# --- Pull OTA ---
# Device polls the firmware manifest every 6h and self-updates if a newer
# version is available.  The manifest is served by a simple HTTP server on
# rpi4 and updated by the deploy.sh script after each compile.
http_request:
  timeout: 10s
  useragent: esphome/bb32

ota:
  - platform: http_request
    id: ota_http
  - platform: esphome
    password: "48d462d0fa84e4d6f0d4fc0f3086b2f4"

update:
  - platform: http_request
    id: firmware_update
    name: "bb32 Firmware"
    source: "${firmware_url}/bb32_manifest.json"
    update_interval: 12h
    on_update_available:
      - lambda: |-
          // Never auto-update a dev build — it would immediately revert to the
          // server version, breaking the local development workflow.
          if (strcmp(ESPHOME_PROJECT_VERSION, "0000.00.00.0000") == 0) {
            ESP_LOGI("ota", "Dev build detected, skipping pull OTA");
            return;
          }
          ESP_LOGI("ota", "Pull OTA: newer firmware available (%s), applying...",
                   x.latest_version.c_str());
          char ota_msg[80];
          snprintf(ota_msg, sizeof(ota_msg), "ota fw=%s->%s",
                   ESPHOME_PROJECT_VERSION, x.latest_version.c_str());
          stra2us_publish(
            id(stra2us_host).c_str(),
            id(stra2us_port),
            id(stra2us_client_id).c_str(),
            id(stra2us_secret_hex).c_str(),
            "coaticlock",
            ota_msg
          );
          id(firmware_update).perform(false);

# 1. Define the I2C bus on the Xiao pins
i2c:
  sda: GPIO6  # Physical pin D4 (Blue wire)
  scl: GPIO7  # Physical pin D5 (Yellow wire)
  scan: true

time:
  - platform: sntp
    id: sntp_time
    timezone: "EST5EDT,M3.2.0,M11.1.0"

globals:
  # Stores the memory address of your physics engine
  - id: engine_ptr
    type: 'void*'
    initial_value: 'nullptr'

  # Tracks the last (virtual) minute to trigger the clock update
  - id: engine_last_minute
    type: 'int'
    initial_value: '-1'
    restore_value: no

  - id: global_brightness
    type: float
    initial_value: '0.7'

  # --- Wobbly Time Settings ---
  # The clock always tries to display a time that is slightly ahead of reality.
  # The displayed time will drift randomly within [wobble_min_minutes, wobble_max_minutes].
  #
  # Stra2us-managed: each var is polled every 5 min from the KV store.
  # Cascade: device key (${stratus_app}/${name}/<id>) checked first,
  #          then app-wide default (${stratus_app}/<id>).

  - id: wobble_min_seconds
    type: int
    initial_value: '120'
    # stratus_key: ${stratus_app}/${name}/wobble_min_seconds
    #              ${stratus_app}/wobble_min_seconds

  - id: wobble_max_seconds
    type: int
    initial_value: '300'
    # stratus_key: ${stratus_app}/${name}/wobble_max_seconds
    #              ${stratus_app}/wobble_max_seconds

  # When the displayed time is behind its target, it runs this much faster than real time.
  - id: wobble_fast_rate
    type: float
    initial_value: '1.3'
    # stratus_key: ${stratus_app}/${name}/wobble_fast_rate
    #              ${stratus_app}/wobble_fast_rate

  # When the displayed time is ahead of its target, it runs this much slower.
  - id: wobble_slow_rate
    type: float
    initial_value: '0.7'
    # stratus_key: ${stratus_app}/${name}/wobble_slow_rate
    #              ${stratus_app}/wobble_slow_rate

  # Memory pointer to the WobblyTime instance
  - id: wobbly_ptr
    type: 'void*'
    initial_value: 'nullptr'

  # --- Stra2us Telemetry ---
  - id: stra2us_host
    type: std::string
    initial_value: '"${stra2us_host}"'
  - id: stra2us_port
    type: int
    initial_value: '${stra2us_port}'
  - id: stra2us_client_id
    type: std::string
    initial_value: '"${stra2us_client_id}"'
  - id: stra2us_secret_hex
    type: std::string
    initial_value: '"${stra2us_secret_hex}"'

font:
  - file: "CustomMerged.bdf"
    id: clock_font

interval:

  - interval: 1s
    then:
      - lambda: |-
          // Initialize WobblyTime singleton on first run
          if (id(wobbly_ptr) == nullptr) {
            WobblyTime* wt = new WobblyTime(
              id(wobble_min_seconds),
              id(wobble_max_seconds),
              id(wobble_fast_rate),
              id(wobble_slow_rate)
            );
            id(wobbly_ptr) = (void*)wt;
          }
          
          if (id(engine_ptr) != nullptr) {
            CoatiEngine* engine = (CoatiEngine*)id(engine_ptr);
            WobblyTime* wt = (WobblyTime*)id(wobbly_ptr);
            auto real_now = id(sntp_time).now();
            if (!real_now.is_valid()) return;

            // Sync WobblyTime parameters from globals (updated by KV poll)
            wt->wobble_min_seconds = id(wobble_min_seconds);
            wt->wobble_max_seconds = id(wobble_max_seconds);
            wt->fast_rate          = id(wobble_fast_rate);
            wt->slow_rate          = id(wobble_slow_rate);

            // Advance virtual time and extract the display minute
            auto virtual_now = wt->advance(real_now);
            if (virtual_now.minute != id(engine_last_minute)) {
              id(engine_last_minute) = virtual_now.minute;
              // Render font to staging buffer only — apply happens in render lambda
              engine->prepare_target(virtual_now, id(clock_font));
            }
          }

  - interval: 300s
    then:
      - lambda: |-
          // --- Uptime report ---
          // Fields: up, heap, heap_lo, rssi, rst, fw
          // heap_lo = minimum ever free heap (best memory-leak indicator)
          // rst     = reset reason (PANIC/WDT → crash, POWERON → normal)

          // Uptime
          uint64_t us   = esp_timer_get_time();
          uint32_t secs = (uint32_t)(us / 1000000ULL);
          uint32_t days = secs / 86400; secs %= 86400;
          uint32_t hrs  = secs / 3600;  secs %= 3600;
          uint32_t mins = secs / 60;    secs %= 60;

          // Reset reason string
          const char* rst = "UNK";
          switch (esp_reset_reason()) {
            case ESP_RST_POWERON:  rst = "POWERON";  break;
            case ESP_RST_SW:       rst = "SW";       break;
            case ESP_RST_PANIC:    rst = "PANIC";    break;
            case ESP_RST_INT_WDT:  rst = "INT_WDT";  break;
            case ESP_RST_TASK_WDT: rst = "TASK_WDT"; break;
            case ESP_RST_WDT:      rst = "WDT";      break;
            case ESP_RST_BROWNOUT: rst = "BROWNOUT"; break;
            case ESP_RST_DEEPSLEEP:rst = "SLEEP";    break;
            default:               rst = "OTHER";    break;
          }

          // WiFi RSSI
          wifi_ap_record_t ap_info;
          int8_t rssi = (esp_wifi_sta_get_ap_info(&ap_info) == ESP_OK) ? ap_info.rssi : 0;

          // Current and target advance from WobblyTime
          WobblyTime* wt_hb = (WobblyTime*)id(wobbly_ptr);
          auto real_now_hb  = id(sntp_time).now();
          int adv_cur = (wt_hb && wt_hb->initialized && real_now_hb.is_valid())
                        ? (int)(wt_hb->virtual_epoch_secs - real_now_hb.timestamp) : -1;
          int adv_tgt = wt_hb ? (int)wt_hb->target_offset_secs : -1;

          // Build report string
          char report[192];
          snprintf(report, sizeof(report),
            "up=%ud%uh%um heap=%lu heap_lo=%lu rssi=%d rst=%s fw=" ESPHOME_PROJECT_VERSION
            " adv_cur=%d adv_tgt=%d",
            days, hrs, mins,
            (unsigned long)esp_get_free_heap_size(),
            (unsigned long)esp_get_minimum_free_heap_size(),
            (int)rssi,
            rst,
            adv_cur, adv_tgt
          );

          const char* h   = id(stra2us_host).c_str();
          int          p   = id(stra2us_port);
          const char* cid = id(stra2us_client_id).c_str();
          const char* sec = id(stra2us_secret_hex).c_str();

          // Heartbeat publish — opens (or reuses) the persistent socket.
          stra2us_publish(h, p, cid, sec, "${stratus_app}", report);

          // --- Stra2us config poll ---
          // Runs immediately after the publish so the socket is already open.
          // Cascade: device-specific key checked first, app-wide default second.
          char val[32];

          if (stra2us_kv_get(h, p, cid, sec, "${stratus_app}/${name}/wobble_min_seconds", val, sizeof(val))
           || stra2us_kv_get(h, p, cid, sec, "${stratus_app}/wobble_min_seconds",         val, sizeof(val)))
            id(wobble_min_seconds) = atoi(val);

          if (stra2us_kv_get(h, p, cid, sec, "${stratus_app}/${name}/wobble_max_seconds", val, sizeof(val))
           || stra2us_kv_get(h, p, cid, sec, "${stratus_app}/wobble_max_seconds",         val, sizeof(val)))
            id(wobble_max_seconds) = atoi(val);

          if (stra2us_kv_get(h, p, cid, sec, "${stratus_app}/${name}/wobble_fast_rate", val, sizeof(val))
           || stra2us_kv_get(h, p, cid, sec, "${stratus_app}/wobble_fast_rate",         val, sizeof(val)))
            id(wobble_fast_rate) = atof(val);

          if (stra2us_kv_get(h, p, cid, sec, "${stratus_app}/${name}/wobble_slow_rate", val, sizeof(val))
           || stra2us_kv_get(h, p, cid, sec, "${stratus_app}/wobble_slow_rate",         val, sizeof(val)))
            id(wobble_slow_rate) = atof(val);

# 2. Define the Light Sensor and Auto-Dimming logic
sensor:
  - platform: bh1750
    name: "Ambient Light"
    id: ambient_light
    address: 0x23
    update_interval: 10s
    on_value:
      then:
        - lambda: |-
            // Sqrt curve: compensates for eye log-scale response and pushes
            // more brightness into the mid-lux range. Divisor 375 means
            // 100% LED output is reached at 375 lux (~75% of a bright room),
            // clamping there for anything brighter.
            float target = sqrtf(x / 375.0f);
            target = clamp(target, 0.2f, 1.0f);
            // Low-pass filter: 30% new / 70% old (~60s to 90% of a step change,
            // down from ~100s with the previous 20/80 split).
            id(global_brightness) = (target * 0.3f) + (id(global_brightness) * 0.7f);

light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    pin: GPIO10
    num_leds: 256
    chipset: WS2812
    id: matrix_strip
    name: "LED Matrix Clock"

display:
  - platform: addressable_light
    id: matrix_display
    addressable_light_id: matrix_strip
    width: 32
    height: 8
    pixel_mapper: |-
      if (x % 2 == 0) {
        return (x * 8) + y;
      }
      return (x * 8) + (7 - y);
    rotation: 0°
    update_interval: 33ms
    lambda: |-
      static CoatiEngine* engine = nullptr;
      if (engine == nullptr) {
        engine = new CoatiEngine();
        id(engine_ptr) = (void*)engine;
      }
      
      static long last_tick_time = millis();
      long now = millis();
      
      // Apply any pending target update from the timer context.
      // This is safe here: both apply_pending_target() and tick() run in
      // the same (main task) execution context as this lambda.
      engine->apply_pending_target();

      // Physics tick at 50ms intervals
      if (now - last_tick_time >= 50) {
        last_tick_time = now;
        engine->tick();
      }
      
      // Calculate blending fraction between physics frames
      float blend = (float)(now - last_tick_time) / 50.0f;
      if (blend > 1.0f) blend = 1.0f;
      
      // Advance pixel fading for ACTIVE board pixels only.
      // Incrementing fade for dark (false) positions caused spurious green flashes
      // when those positions briefly transitioned to true with non-zero fade values.
      for (int x = 0; x < 32; x++) {
        for (int y = 0; y < 8; y++) {
            if (engine->current_board[x][y] && engine->fade_board[x][y] < 1.0f) {
                engine->fade_board[x][y] += 0.032f;
                if (engine->fade_board[x][y] > 1.0f) engine->fade_board[x][y] = 1.0f;
            }
        }
      }

      // Board snapshot for stable rendering
      bool board_snap[32][8];
      float fade_snap[32][8];
      memcpy(board_snap, engine->current_board, sizeof(board_snap));
      memcpy(fade_snap,  engine->fade_board,    sizeof(fade_snap));

      float bri = id(global_brightness);
      Color green = Color(0,               (uint8_t)(255 * bri), 0);
      Color red   = Color((uint8_t)(255 * bri), 0,               0);
      Color blue  = Color(0,               0,               (uint8_t)(255 * bri));
      Color white = Color((uint8_t)(255 * bri), (uint8_t)(255 * bri), (uint8_t)(255 * bri));
      Color cyan  = Color(0,               (uint8_t)(255 * bri), (uint8_t)(255 * bri));
      
      // Draw static endpoints (Dumpster & Pool)
      it.draw_pixel_at(0, 7, red);
      it.draw_pixel_at(1, 7, red);
      it.draw_pixel_at(30, 7, blue);
      it.draw_pixel_at(31, 7, blue);
      
      // Draw physical pixels deposited (using stable snapshot)
      for (int x = 0; x < 32; x++) {
        for (int y = 0; y < 8; y++) {
          if (board_snap[x][y]) {
            if (y == 7 && (x <= 1 || x >= 30)) continue;
            it.draw_pixel_at(x, y, Color(0, (uint8_t)(255 * fade_snap[x][y] * bri), 0));
          }
        }
      }
      
      // Draw Coatis dynamically
      for (size_t i = 0; i < engine->agents.size(); i++) {
        auto& agent = engine->agents[i];
        
        Color agent_color;
        if (agent.carrying) {
           float pulse = 0.7f + 0.3f * sin(now / 150.0f);
           agent_color = Color((uint8_t)(255 * pulse * bri), (uint8_t)(255 * pulse * bri), 0);
        } else {
           if (i == 0) agent_color = white;
           else agent_color = cyan;
        }
        
        // Frustration shimmer
        if (agent.wait_ticks > 1) {
            float shim = (sin(now / 30.0f) > 0) ? 1.0f : 0.0f;
            if (shim > 0.5f) agent_color = Color((uint8_t)(255*bri), (uint8_t)(100*bri), (uint8_t)(100*bri));
        }
        
        if (agent.pos == agent.last_pos) {
            it.draw_pixel_at(agent.pos.x, agent.pos.y, agent_color);
        } else {
            // Motion Blur Temporal Antialiasing
            Color dep = agent_color;
            dep.r = dep.r * (1.0f - blend);
            dep.g = dep.g * (1.0f - blend);
            dep.b = dep.b * (1.0f - blend);
            dep.w = dep.w * (1.0f - blend);
            it.draw_pixel_at(agent.last_pos.x, agent.last_pos.y, dep);
            
            Color arr = agent_color;
            arr.r = arr.r * blend;
            arr.g = arr.g * blend;
            arr.b = arr.b * blend;
            arr.w = arr.w * blend;
            it.draw_pixel_at(agent.pos.x, agent.pos.y, arr);
        }
      }

# Logging — baud_rate: 0 disables UART (nothing to read over USB anyway).
# Logs still stream over the native API: `esphome logs bb32.yaml`
# Level INFO keeps coati state transitions visible without the LOGD flood
# from ESPHome's own internal components.
logger:
  baud_rate: 0
  level: INFO
