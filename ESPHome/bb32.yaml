substitutions:
  stra2us_client_id: !secret stra2us_client_id
  stra2us_secret_hex: !secret stra2us_secret_hex
  stra2us_host: !secret stra2us_host
  firmware_host: !secret firmware_host
  project_version: !env_var ESPHOME_PROJECT_VERSION dev

esphome:
  name: bb32
  friendly_name: bb32
  project:
    name: coaticlock.bb32
    version: "${project_version}"
  includes:
    - coati_engine.h
    - IoTClientIDF.h
    - bb32_idf_includes.h

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf
    version: 5.5.3

# Enable Home Assistant API
api:
  encryption:
    key: "ZkIcQPXumySkKDYUxq3PFE6oZxuMusI6gNv1VTd/Z98="

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  fast_connect: true
  power_save_mode: NONE
  ap:
    ssid: "Bb32 Fallback Hotspot"
    password: "ByIg5i1tSdFp"

captive_portal:

# --- Pull OTA ---
# Device polls the firmware manifest every 6h and self-updates if a newer
# version is available.  The manifest is served by a simple HTTP server on
# rpi4 and updated by the deploy.sh script after each compile.
http_request:
  timeout: 30s
  useragent: esphome/bb32

ota:
  - platform: http_request
    id: ota_http
  - platform: esphome
    password: "48d462d0fa84e4d6f0d4fc0f3086b2f4"

update:
  - platform: http_request
    id: firmware_update
    name: "bb32 Firmware"
    source: "http://${firmware_host}:8080/bb32_manifest.json"
    update_interval: 6h

time:
  - platform: sntp
    id: sntp_time
    timezone: "EST5EDT,M3.2.0,M11.1.0"

globals:
  # Stores the memory address of your physics engine
  - id: engine_ptr
    type: 'void*'
    initial_value: 'nullptr'

  # Tracks the last (virtual) minute to trigger the clock update
  - id: engine_last_minute
    type: 'int'
    initial_value: '-1'
    restore_value: no

  # --- Wobbly Time Settings ---
  # The clock always tries to display a time that is slightly ahead of reality.
  # The displayed time will drift randomly within [wobble_min_minutes, wobble_max_minutes].
  - id: wobble_min_minutes
    type: int
    initial_value: '2'

  - id: wobble_max_minutes
    type: int
    initial_value: '5'

  # When the displayed time is behind its target, it runs this much faster than real time.
  - id: wobble_fast_rate
    type: float
    initial_value: '1.3'

  # When the displayed time is ahead of its target, it runs this much slower.
  - id: wobble_slow_rate
    type: float
    initial_value: '0.7'

  # Memory pointer to the WobblyTime instance
  - id: wobbly_ptr
    type: 'void*'
    initial_value: 'nullptr'

  # --- Stra2us Telemetry ---
  - id: stra2us_host
    type: std::string
    initial_value: '"${stra2us_host}"'
  - id: stra2us_port
    type: int
    initial_value: '8000'
  - id: stra2us_client_id
    type: std::string
    initial_value: '"${stra2us_client_id}"'
  - id: stra2us_secret_hex
    type: std::string
    initial_value: '"${stra2us_secret_hex}"'

font:
  - file: "CustomMerged.bdf"
    id: clock_font

interval:

  - interval: 1s
    then:
      - lambda: |-
          // Initialize WobblyTime singleton on first run
          if (id(wobbly_ptr) == nullptr) {
            WobblyTime* wt = new WobblyTime(
              id(wobble_min_minutes),
              id(wobble_max_minutes),
              id(wobble_fast_rate),
              id(wobble_slow_rate)
            );
            id(wobbly_ptr) = (void*)wt;
          }
          
          if (id(engine_ptr) != nullptr) {
            CoatiEngine* engine = (CoatiEngine*)id(engine_ptr);
            WobblyTime* wt = (WobblyTime*)id(wobbly_ptr);
            auto real_now = id(sntp_time).now();
            if (!real_now.is_valid()) return;
            
            // Advance virtual time and extract the display minute
            auto virtual_now = wt->advance(real_now);
            if (virtual_now.minute != id(engine_last_minute)) {
              id(engine_last_minute) = virtual_now.minute;
              // Render font to staging buffer only — apply happens in render lambda
              engine->prepare_target(virtual_now, id(clock_font));
            }
          }

  - interval: 60s
    then:
      - lambda: |-
          // --- Uptime report ---
          // Fields: up, heap, heap_lo, rssi, rst, fw
          // heap_lo = minimum ever free heap (best memory-leak indicator)
          // rst     = reset reason (PANIC/WDT → crash, POWERON → normal)

          // Uptime
          uint64_t us   = esp_timer_get_time();
          uint32_t secs = (uint32_t)(us / 1000000ULL);
          uint32_t days = secs / 86400; secs %= 86400;
          uint32_t hrs  = secs / 3600;  secs %= 3600;
          uint32_t mins = secs / 60;    secs %= 60;

          // Reset reason string
          const char* rst = "UNK";
          switch (esp_reset_reason()) {
            case ESP_RST_POWERON:  rst = "POWERON";  break;
            case ESP_RST_SW:       rst = "SW";       break;
            case ESP_RST_PANIC:    rst = "PANIC";    break;
            case ESP_RST_INT_WDT:  rst = "INT_WDT";  break;
            case ESP_RST_TASK_WDT: rst = "TASK_WDT"; break;
            case ESP_RST_WDT:      rst = "WDT";      break;
            case ESP_RST_BROWNOUT: rst = "BROWNOUT"; break;
            case ESP_RST_DEEPSLEEP:rst = "SLEEP";    break;
            default:               rst = "OTHER";    break;
          }

          // WiFi RSSI
          wifi_ap_record_t ap_info;
          int8_t rssi = (esp_wifi_sta_get_ap_info(&ap_info) == ESP_OK) ? ap_info.rssi : 0;

          // Build report string
          char report[160];
          snprintf(report, sizeof(report),
            "up=%ud%uh%um heap=%lu heap_lo=%lu rssi=%d rst=%s fw=" ESPHOME_PROJECT_VERSION,
            days, hrs, mins,
            (unsigned long)esp_get_free_heap_size(),
            (unsigned long)esp_get_minimum_free_heap_size(),
            (int)rssi,
            rst
          );

          stra2us_publish(
            id(stra2us_host).c_str(),
            id(stra2us_port),
            id(stra2us_client_id).c_str(),
            id(stra2us_secret_hex).c_str(),
            "coaticlock",
            report
          );

light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    pin: GPIO10
    num_leds: 256
    chipset: WS2812
    id: matrix_strip
    name: "LED Matrix Clock"

display:
  - platform: addressable_light
    id: matrix_display
    addressable_light_id: matrix_strip
    width: 32
    height: 8
    pixel_mapper: |-
      if (x % 2 == 0) {
        return (x * 8) + y;
      }
      return (x * 8) + (7 - y);
    rotation: 0°
    update_interval: 33ms
    lambda: |-
      static CoatiEngine* engine = nullptr;
      if (engine == nullptr) {
        engine = new CoatiEngine();
        id(engine_ptr) = (void*)engine;
      }
      
      static long last_tick_time = millis();
      long now = millis();
      
      // Apply any pending target update from the timer context.
      // This is safe here: both apply_pending_target() and tick() run in
      // the same (main task) execution context as this lambda.
      engine->apply_pending_target();

      // Physics tick at 50ms intervals
      if (now - last_tick_time >= 50) {
        last_tick_time = now;
        engine->tick();
      }
      
      // Calculate blending fraction between physics frames
      float blend = (float)(now - last_tick_time) / 50.0f;
      if (blend > 1.0f) blend = 1.0f;
      
      // Advance pixel fading for ACTIVE board pixels only.
      // Incrementing fade for dark (false) positions caused spurious green flashes
      // when those positions briefly transitioned to true with non-zero fade values.
      for (int x = 0; x < 32; x++) {
        for (int y = 0; y < 8; y++) {
            if (engine->current_board[x][y] && engine->fade_board[x][y] < 1.0f) {
                engine->fade_board[x][y] += 0.032f;
                if (engine->fade_board[x][y] > 1.0f) engine->fade_board[x][y] = 1.0f;
            }
        }
      }

      // Board snapshot for stable rendering
      bool board_snap[32][8];
      float fade_snap[32][8];
      memcpy(board_snap, engine->current_board, sizeof(board_snap));
      memcpy(fade_snap,  engine->fade_board,    sizeof(fade_snap));

      Color green = Color(0, 255, 0);
      Color red = Color(255, 0, 0);
      Color blue = Color(0, 0, 255);
      Color white = Color(255, 255, 255);
      Color cyan = Color(0, 255, 255);
      
      // Draw static endpoints (Dumpster & Pool)
      it.draw_pixel_at(0, 7, red);
      it.draw_pixel_at(1, 7, red);
      it.draw_pixel_at(30, 7, blue);
      it.draw_pixel_at(31, 7, blue);
      
      // Draw physical pixels deposited (using stable snapshot)
      for (int x = 0; x < 32; x++) {
        for (int y = 0; y < 8; y++) {
          if (board_snap[x][y]) {
            if (y == 7 && (x <= 1 || x >= 30)) continue;
            it.draw_pixel_at(x, y, Color(0, (uint8_t)(255 * fade_snap[x][y]), 0));
          }
        }
      }
      
      // Draw Coatis dynamically
      for (size_t i = 0; i < engine->agents.size(); i++) {
        auto& agent = engine->agents[i];
        
        Color agent_color;
        if (agent.carrying) {
           float pulse = 0.7f + 0.3f * sin(now / 150.0f);
           agent_color = Color(255 * pulse, 255 * pulse, 0); 
        } else {
           if (i == 0) agent_color = white;
           else agent_color = cyan;
        }
        
        // Frustration shimmer
        if (agent.wait_ticks > 1) {
            float shim = (sin(now / 30.0f) > 0) ? 1.0f : 0.0f;
            if (shim > 0.5f) agent_color = Color(255, 100, 100);
        }
        
        if (agent.pos == agent.last_pos) {
            it.draw_pixel_at(agent.pos.x, agent.pos.y, agent_color);
        } else {
            // Motion Blur Temporal Antialiasing
            Color dep = agent_color;
            dep.r = dep.r * (1.0f - blend);
            dep.g = dep.g * (1.0f - blend);
            dep.b = dep.b * (1.0f - blend);
            dep.w = dep.w * (1.0f - blend);
            it.draw_pixel_at(agent.last_pos.x, agent.last_pos.y, dep);
            
            Color arr = agent_color;
            arr.r = arr.r * blend;
            arr.g = arr.g * blend;
            arr.b = arr.b * blend;
            arr.w = arr.w * blend;
            it.draw_pixel_at(agent.pos.x, agent.pos.y, arr);
        }
      }

# Ensure logger is present
logger:
  level: INFO
    
